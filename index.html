<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Fix</title>
  <style>
    :root {
      --primary: #FF9F43;
      --secondary: #48DBFB;
      --success: #2ECC71;
      --danger: #FF4757;
      --bg: #F7F9FC;
    }

    body { 
      margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; 
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; touch-action: none;
    }

    #overlay {
      position: fixed; inset: 0; background: var(--primary); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white;
    }

    #main { 
      display: none; flex: 1; flex-direction: column; padding: 15px; 
      justify-content: space-between; max-width: 600px; margin: 0 auto; width: 100%;
      box-sizing: border-box;
    }

    .word-area {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: white; border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 15px; border: 4px solid #eee;
      padding: 20px;
    }

    #big-word { 
      font-size: clamp(30px, 10vw, 70px); 
      font-weight: 900; color: #2D3436; text-align: center; margin-bottom: 10px;
    }

    #syl-view { font-size: 28px; color: #A0A0A0; font-weight: 600; text-align: center; }

    .active-syl { color: var(--primary); transform: scale(1.2); display: inline-block; text-decoration: underline; }

    .mic-section {
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      padding-bottom: 20px;
    }

    #mic-btn {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--secondary); border: 6px solid white;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn.recording {
      background: var(--danger); transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 71, 87, 0.4);
    }

    .ui-group { display: flex; gap: 8px; width: 100%; }
    input { 
      flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #ddd;
      font-size: 16px; outline: none;
    }

    .btn-ok { padding: 0 20px; border-radius: 15px; border: none; background: var(--success); color: white; font-weight: bold; }

    #status { font-weight: bold; height: 30px; color: #636E72; text-align: center; padding-top: 10px; }
  </style>
</head>
<body>

<div id="overlay">
  <button style="padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; cursor: pointer;" onclick="startApp()">ПОЧАТИ</button>
</div>

<div id="main">
  <div id="status">Натисни та тримай мікрофон</div>

  <div class="word-area">
    <div id="big-word">ПРИВІТ!</div>
    <div id="syl-view"></div>
  </div>

  <div class="mic-section">
    <div id="mic-btn">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    
    <div class="ui-group">
      <input type="text" id="manual" placeholder="Напиши слово..." autocomplete="off">
      <button class="btn-ok" onclick="fromInput()">ОК</button>
    </div>
  </div>
</div>

<script>
  const bigWord = document.getElementById('big-word');
  const sylView = document.getElementById('syl-view');
  const status = document.getElementById('status');
  const micBtn = document.getElementById('mic-btn');
  const manualInput = document.getElementById('manual');

  let recognition;
  let isSpeaking = false;

  // Функція розбиття на склади
  function getSyllables(word) {
    const vowels = "аоуиіеяюєї";
    const syllables = [];
    let current = "";
    for (let i = 0; i < word.length; i++) {
      current += word[i];
      if (vowels.includes(word[i].toLowerCase())) {
        let hasNextVowel = false;
        for (let j = i + 1; j < word.length; j++) {
          if (vowels.includes(word[j].toLowerCase())) { hasNextVowel = true; break; }
        }
        if (hasNextVowel) { syllables.push(current); current = ""; }
      }
    }
    if (current) syllables.push(current);
    if (syllables.length > 1 && ![...syllables[syllables.length-1]].some(c => vowels.includes(c.toLowerCase()))) {
      const tail = syllables.pop();
      syllables[syllables.length-1] += tail;
    }
    return syllables;
  }

  // Озвучка
  async function speakWord(word) {
    if (!word || isSpeaking) return;
    
    const cleanWord = word.trim().toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!cleanWord) return;

    isSpeaking = true;
    window.speechSynthesis.cancel(); // Зупиняємо попередню озвучку

    const syllables = getSyllables(cleanWord);
    bigWord.innerText = cleanWord.toUpperCase();
    status.innerText = "🔊 Читаю...";

    for (let i = 0; i < syllables.length; i++) {
      sylView.innerHTML = syllables.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(res => {
        const u = new SpeechSynthesisUtterance(syllables[i]);
        u.lang = 'uk-UA';
        u.rate = 0.6;
        u.onend = res;
        u.onerror = res;
        window.speechSynthesis.speak(u);
      });
    }
    
    isSpeaking = false;
    status.innerText = "Чекаю на нове слово...";
  }

  // Обробка інпуту
  function fromInput() {
    const val = manualInput.value;
    if (val) {
      speakWord(val);
      manualInput.value = "";
      manualInput.blur();
    }
  }

  // Слухаємо Enter в полі вводу
  manualInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') fromInput();
  });

  // Логіка мікрофона
  function setupMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      status.innerText = "Голос не підтримується";
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'uk-UA';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      const words = text.trim().split(' ');
      speakWord(words[words.length - 1]);
    };

    recognition.onerror = (e) => {
      console.error("Помилка:", e.error);
      micBtn.classList.remove('recording');
    };

    recognition.onend = () => {
      micBtn.classList.remove('recording');
    };

    // Обробники для кнопки (миша та тач)
    const startEvent = (e) => {
      e.preventDefault();
      if (isSpeaking) return;
      micBtn.classList.add('recording');
      status.innerText = "🎤 Говори...";
      try { recognition.start(); } catch(err) {}
    };

    const stopEvent = (e) => {
      e.preventDefault();
      try { recognition.stop(); } catch(err) {}
    };

    micBtn.addEventListener('mousedown', startEvent);
    micBtn.addEventListener('mouseup', stopEvent);
    micBtn.addEventListener('touchstart', startEvent, {passive: false});
    micBtn.addEventListener('touchend', stopEvent, {passive: false});
  }

  function startApp() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    setupMic();
    // Розблокування звуку для iOS
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
  }
</script>
</body>
</html>
