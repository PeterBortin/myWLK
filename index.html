<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик: Остання Надія</title>
  <style>
    :root { --p: #FF9F43; --s: #48DBFB; --bg: #F7F9FC; --err: #FF4757; }
    body { 
      margin: 0; background: var(--bg); font-family: sans-serif; 
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none;
    }
    #overlay { position: fixed; inset: 0; background: var(--p); z-index: 100; display: flex; justify-content: center; align-items: center; }
    #main { display: none; flex: 1; flex-direction: column; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    
    .word-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: white; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
    }
    #big-word { font-size: 50px; font-weight: 900; color: #333; text-align: center; }
    #syl-view { font-size: 30px; color: #999; margin-top: 10px; }
    .active-syl { color: var(--p); font-weight: bold; }

    .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; }
    
    /* Індикатор того, що мікрофон "чує" звук */
    #volume-bar {
      width: 100px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden;
    }
    #volume-fill { width: 0%; height: 100%; background: var(--s); transition: width 0.1s; }

    #mic-btn {
      width: 120px; height: 120px; border-radius: 60px; background: var(--s); border: 8px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #mic-btn.active { background: var(--err); transform: scale(1.1); }
    
    .input-row { display: flex; gap: 10px; width: 100%; margin-top: 20px; }
    input { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 18px; }
    #status { font-size: 14px; color: #666; text-align: center; margin-bottom: 10px; font-weight: bold; }
  </style>
</head>
<body>

<div id="overlay">
  <button style="padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none; cursor: pointer;" onclick="init()">ЗАПУСТИТИ</button>
</div>

<div id="main">
  <div id="status">Натисни і тримай кнопку</div>
  <div class="word-area">
    <div id="big-word">ПРИВІТ</div>
    <div id="syl-view"></div>
  </div>
  <div class="mic-wrap">
    <div id="volume-bar"><div id="volume-fill"></div></div>
    <div id="mic-btn">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    <div class="input-row">
      <input type="text" id="manual" placeholder="Або напиши тут...">
      <button onclick="handleInput()" style="padding: 15px; border-radius: 15px; border: none; background: #2ecc71; color: white;">ОК</button>
    </div>
  </div>
</div>

<script>
  let recognition;
  let isSpeaking = false;
  const status = document.getElementById('status');
  const volFill = document.getElementById('volume-fill');

  // Функція складів
  function getSyllables(w) {
    const v = "аоуиіеяюєї";
    let res = [], cur = "";
    for (let i = 0; i < w.length; i++) {
      cur += w[i];
      if (v.includes(w[i].toLowerCase())) {
        let next = false;
        for (let j = i+1; j < w.length; j++) if (v.includes(w[j].toLowerCase())) next = true;
        if (next) { res.push(cur); cur = ""; }
      }
    }
    res.push(cur);
    if (res.length > 1 && ![...res[res.length-1]].some(c => v.includes(c.toLowerCase()))) {
      res[res.length-2] += res.pop();
    }
    return res.filter(s => s);
  }

  // Озвучка (працює і для мікрофона, і для інпуту)
  async function processWord(word) {
    if (!word || isSpeaking) return;
    const clean = word.toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!clean) return;

    isSpeaking = true;
    window.speechSynthesis.cancel();
    
    document.getElementById('big-word').innerText = clean.toUpperCase();
    const syls = getSyllables(clean);

    for (let i = 0; i < syls.length; i++) {
      document.getElementById('syl-view').innerHTML = syls.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(resolve => {
        const u = new SpeechSynthesisUtterance(syls[i]);
        u.lang = 'uk-UA'; u.rate = 0.6;
        u.onend = resolve; u.onerror = resolve;
        window.speechSynthesis.speak(u);
      });
    }
    isSpeaking = false;
    status.innerText = "Готово! Кажи ще.";
  }

  function handleInput() {
    const input = document.getElementById('manual');
    processWord(input.value);
    input.value = "";
    input.blur();
  }

  // Налаштування мікрофона
  function initMic() {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      status.innerText = "Голос не підтримується цим браузером";
      return;
    }

    recognition = new SpeechRec();
    recognition.lang = 'uk-UA';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      status.innerText = "Почув: " + text;
      processWord(text.trim().split(' ').pop());
    };

    recognition.onerror = (e) => {
      status.innerText = "Помилка мікрофона: " + e.error;
      volFill.style.width = '0%';
    };

    recognition.onend = () => {
      document.getElementById('mic-btn').classList.remove('active');
      volFill.style.width = '0%';
    };
  }

  function init() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    initMic();
    
    // "Розігрів" аудіо для iOS
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

    const btn = document.getElementById('mic-btn');

    const startRecording = (e) => {
      e.preventDefault();
      if (isSpeaking) return;
      btn.classList.add('active');
      status.innerText = "СЛУХАЮ...";
      try { 
        recognition.start();
        volFill.style.width = '100%'; // Просто візуальний ефект
      } catch(err) { console.log(err); }
    };

    const stopRecording = (e) => {
      e.preventDefault();
      try { recognition.stop(); } catch(err) {}
      status.innerText = "ОБРОБКА...";
    };

    // Слухачі для всіх типів екранів
    btn.addEventListener('mousedown', startRecording);
    btn.addEventListener('mouseup', stopRecording);
    btn.addEventListener('touchstart', startRecording, {passive: false});
    btn.addEventListener('touchend', stopRecording, {passive: false});
  }
</script>
</body>
</html>
