<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Ultra-Light</title>
  
  <style>
    body { 
      margin: 0; background: #fff; font-family: sans-serif; 
      height: 100vh; display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* Стартовая кнопка на весь экран, чтобы "разбудить" звук в браузере */
    #overlay {
      position: fixed; inset: 0; background: #FF9F43; z-index: 99;
      display: flex; justify-content: center; align-items: center;
    }

    #main { 
      display: none; flex: 1; flex-direction: column; padding: 15px; 
      justify-content: space-between;
    }

    .word-area {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: #f0f0f0; border-radius: 20px;
    }

    #big-word { font-size: 50px; font-weight: bold; text-align: center; margin-bottom: 10px; }
    #syl-view { font-size: 30px; color: #FF9F43; min-height: 40px; }

    .active { color: #2ecc71; transform: scale(1.2); display: inline-block; }

    .ui { display: flex; gap: 8px; margin-top: 15px; }
    input { 
      flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #ccc;
      font-size: 18px; outline: none;
    }
    button { 
      padding: 15px 25px; border-radius: 12px; border: none; 
      background: #48DBFB; color: #fff; font-weight: bold;
    }

    #status { text-align: center; font-size: 14px; color: #888; padding: 10px; }
    .rec { color: red; font-weight: bold; }
  </style>
</head>
<body>

<div id="overlay">
  <button style="padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none;" onclick="start()">ПОЧАТИ</button>
</div>

<div id="main">
  <div class="word-area">
    <div id="big-word">ГОВОРИ!</div>
    <div id="syl-view"></div>
  </div>

  <div class="ui">
    <input type="text" id="manual" placeholder="Напиши слово...">
    <button onclick="fromInput()">ОК</button>
  </div>
  <div id="status">Очікування...</div>
</div>

<script>
  const bigWord = document.getElementById('big-word');
  const sylView = document.getElementById('syl-view');
  const status = document.getElementById('status');
  let rec;

  // Простейший алгоритм слогов
  function getSyllables(w) {
    const vowels = "аоуиіеяюєї";
    let res = [], cur = "";
    for (let i = 0; i < w.length; i++) {
      cur += w[i];
      if (vowels.includes(w[i].toLowerCase())) {
        let nextV = false;
        for (let j = i + 1; j < w.length; j++) if (vowels.includes(w[j].toLowerCase())) nextV = true;
        if (nextV) { res.push(cur); cur = ""; }
      }
    }
    res.push(cur);
    if (res.length > 1 && !/[аоуиіеяюєї]/i.test(res[res.length-1])) {
      res[res.length-2] += res.pop();
    }
    return res.filter(s => s);
  }

  async function speak(word) {
    if (!word) return;
    
    // 1. Останавливаем микрофон, чтобы не тупило
    if (rec) rec.stop();
    status.innerText = "Озвучую...";
    status.className = "";

    const syllables = getSyllables(word.toLowerCase());
    bigWord.innerText = word.toUpperCase();

    for (let i = 0; i < syllables.length; i++) {
      sylView.innerHTML = syllables.map((s, idx) => 
        `<span class="${idx === i ? 'active' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(r => {
        const u = new SpeechSynthesisUtterance(syllables[i]);
        u.lang = 'uk-UA';
        u.rate = 0.7;
        u.onend = r;
        u.onerror = r;
        window.speechSynthesis.speak(u);
      });
    }

    // 2. Возвращаем микрофон в работу
    if (rec) try { rec.start(); } catch(e) {}
  }

  function fromInput() {
    const val = document.getElementById('manual').value.trim();
    if (val) {
      speak(val);
      document.getElementById('manual').value = "";
      document.activeElement.blur();
    }
  }

  function start() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      rec = new SR();
      rec.lang = 'uk-UA';
      rec.continuous = false; // Важно: false для мобилок лучше

      rec.onstart = () => { status.innerText = "🎤 Слухаю..."; status.className = "rec"; };
      rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        const w = text.split(' ').pop().replace(/[^а-яіїєґ]/gi, '');
        if (w.length > 1) speak(w);
      };
      // Перезапуск только если не говорим
      rec.onend = () => { if (status.innerText !== "Озвучую...") rec.start(); };
      rec.start();
    } else {
      status.innerText = "Голос не підтримується";
    }
  }
</script>
</body>
</html>
