<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Ultra-Light Pro</title>
  <style>
    :root {
      --primary: #FF9F43;
      --secondary: #48DBFB;
      --success: #2ECC71;
      --bg: #F7F9FC;
    }

    body { 
      margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; 
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; touch-action: manipulation;
    }

    #overlay {
      position: fixed; inset: 0; background: var(--primary); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center; padding: 20px;
    }

    #main { 
      display: none; flex: 1; flex-direction: column; padding: 15px; 
      justify-content: space-between; max-width: 600px; margin: 0 auto; width: 100%;
      box-sizing: border-box;
    }

    .word-area {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: white; border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 15px; border: 4px solid #eee;
      padding: 20px;
    }

    #big-word { 
      font-size: clamp(35px, 12vw, 70px); 
      font-weight: 900; color: #2D3436; 
      text-align: center; margin-bottom: 15px;
      word-break: break-word;
    }

    #syl-view { 
      font-size: clamp(20px, 7vw, 35px); 
      color: #A0A0A0; font-weight: 600;
      text-align: center;
    }

    .active-syl { 
      color: var(--primary); 
      transform: scale(1.2); 
      display: inline-block;
      transition: all 0.2s ease;
    }

    .ui-group { display: flex; gap: 10px; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    
    input { 
      flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #E0E0E0;
      font-size: 16px; outline: none; -webkit-appearance: none;
    }

    .btn { 
      padding: 15px 25px; border-radius: 15px; border: none; 
      background: var(--secondary); color: #fff; font-weight: bold;
      cursor: pointer;
    }

    #status { 
      text-align: center; font-size: 14px; font-weight: bold;
      padding: 10px; height: 40px; display: flex; align-items: center; justify-content: center;
    }
    .rec-active { color: #FF4757; }
    .speaking { color: var(--success); }
  </style>
</head>
<body>

<div id="overlay">
  <h1 style="margin: 0 0 10px 0;">Читайлик</h1>
  <p style="margin-bottom: 25px; opacity: 0.9;">Програма допоможе дитині вчити склади</p>
  <button class="btn" style="padding: 20px 50px; font-size: 20px; background: white; color: var(--primary);" onclick="startApp()">ПОЧАТИ</button>
</div>

<div id="main">
  <div id="status">Завантаження...</div>

  <div class="word-area">
    <div id="big-word">ПРИВІТ</div>
    <div id="syl-view"></div>
  </div>

  <div class="ui-group">
    <input type="text" id="manual" placeholder="Напиши слово..." autocomplete="off">
    <button class="btn" onclick="fromInput()">ОК</button>
  </div>
</div>

<script>
  const bigWord = document.getElementById('big-word');
  const sylView = document.getElementById('syl-view');
  const status = document.getElementById('status');
  const manualInput = document.getElementById('manual');
  
  let recognition;
  let isSpeaking = false;
  let canStartRecognition = true;

  function getSyllables(word) {
    const vowels = "аоуиіеяюєї";
    const syllables = [];
    let currentSyllable = "";

    for (let i = 0; i < word.length; i++) {
      currentSyllable += word[i];
      if (vowels.includes(word[i].toLowerCase())) {
        let hasMoreVowels = false;
        for (let j = i + 1; j < word.length; j++) {
          if (vowels.includes(word[j].toLowerCase())) {
            hasMoreVowels = true;
            break;
          }
        }
        if (hasMoreVowels) {
          syllables.push(currentSyllable);
          currentSyllable = "";
        }
      }
    }
    if (currentSyllable) syllables.push(currentSyllable);
    
    if (syllables.length > 1) {
      const last = syllables[syllables.length - 1];
      const hasVowel = [...last].some(char => vowels.includes(char.toLowerCase()));
      if (!hasVowel) {
        const tail = syllables.pop();
        syllables[syllables.length - 1] += tail;
      }
    }
    return syllables;
  }

  async function speakWord(word) {
    if (!word || isSpeaking) return;
    
    isSpeaking = true;
    canStartRecognition = false;
    
    if (recognition) {
        try { recognition.abort(); } catch(e) {}
    }

    // Очищення черги синтезу
    window.speechSynthesis.cancel();

    const cleanWord = word.trim().toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!cleanWord) {
      resetState();
      return;
    }

    const syllables = getSyllables(cleanWord);
    bigWord.innerText = cleanWord.toUpperCase();
    status.innerText = "🔊 Читаю...";
    status.className = "speaking";

    for (let i = 0; i < syllables.length; i++) {
      sylView.innerHTML = syllables.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(syllables[i]);
        utterance.lang = 'uk-UA';
        utterance.rate = 0.6;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.speak(utterance);
      });
    }

    resetState();
  }

  function resetState() {
    isSpeaking = false;
    canStartRecognition = true;
    status.innerText = "🎤 Слухаю...";
    status.className = "rec-active";
    
    // Даємо браузеру час "переварити" завершення синтезу
    setTimeout(() => {
        if (recognition && canStartRecognition) {
            try { recognition.start(); } catch(e) {}
        }
    }, 400);
  }

  function fromInput() {
    const val = manualInput.value;
    if (val) {
      speakWord(val);
      manualInput.value = "";
      manualInput.blur();
    }
  }

  manualInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') fromInput();
  });

  function startApp() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    
    // "Розігрів" синтезу для iOS
    const silent = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(silent);

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'uk-UA';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        status.innerText = "🎤 Слухаю...";
        status.className = "rec-active";
      };

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const lastWord = text.trim().split(' ').pop();
        speakWord(lastWord);
      };

      recognition.onend = () => {
        if (canStartRecognition && !isSpeaking) {
          setTimeout(() => {
            try { recognition.start(); } catch(e) {}
          }, 300);
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'no-speech') {
            // Це нормально, просто перезапускаємо через onend
        } else {
            console.error("Recognition error:", e.error);
        }
      };

      try { recognition.start(); } catch(e) {}
    } else {
      status.innerText = "Голосовий ввід не підтримується";
    }
  }
</script>
</body>
</html>
