<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Push-to-Talk</title>
  <style>
    :root {
      --primary: #FF9F43;
      --secondary: #48DBFB;
      --success: #2ECC71;
      --danger: #FF4757;
      --bg: #F7F9FC;
    }

    body { 
      margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; 
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; touch-action: none; /* Запобігає зуму та скролу при затисканні */
    }

    #overlay {
      position: fixed; inset: 0; background: var(--primary); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center; padding: 20px;
    }

    #main { 
      display: none; flex: 1; flex-direction: column; padding: 15px; 
      justify-content: space-between; max-width: 600px; margin: 0 auto; width: 100%;
      box-sizing: border-box;
    }

    .word-area {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: white; border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 15px; border: 4px solid #eee;
      padding: 20px; position: relative;
    }

    #big-word { 
      font-size: clamp(35px, 12vw, 75px); 
      font-weight: 900; color: #2D3436; 
      text-align: center; margin-bottom: 10px;
    }

    #syl-view { 
      font-size: clamp(20px, 7vw, 35px); 
      color: #A0A0A0; font-weight: 600;
    }

    .active-syl { color: var(--primary); transform: scale(1.2); display: inline-block; }

    /* Кнопка мікрофона */
    .mic-section {
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      padding-bottom: 20px;
    }

    #mic-btn {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--secondary); border: 8px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: all 0.2s;
      user-select: none; -webkit-user-select: none;
    }

    #mic-btn.recording {
      background: var(--danger); transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255, 71, 87, 0.5);
    }

    .mic-icon { width: 40px; height: 40px; fill: white; }

    .ui-group { display: flex; gap: 8px; width: 100%; }
    input { 
      flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #E0E0E0;
      font-size: 16px; outline: none;
    }

    #status { font-weight: bold; height: 24px; color: #636E72; }
  </style>
</head>
<body>

<div id="overlay">
  <button style="padding: 20px 50px; font-size: 20px; border-radius: 50px; border: none; background: white; color: var(--primary); font-weight: bold;" onclick="startApp()">ПОЧАТИ</button>
</div>

<div id="main">
  <div id="status">Затисни кнопку і говори</div>

  <div class="word-area">
    <div id="big-word">ГОВОРИ!</div>
    <div id="syl-view"></div>
  </div>

  <div class="mic-section">
    <div id="mic-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec(event)" ontouchend="stopRec(event)">
      <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    
    <div class="ui-group">
      <input type="text" id="manual" placeholder="Або напиши..." autocomplete="off">
      <button style="padding: 10px 20px; border-radius: 12px; border: none; background: #eee;" onclick="fromInput()">ОК</button>
    </div>
  </div>
</div>

<script>
  const bigWord = document.getElementById('big-word');
  const sylView = document.getElementById('syl-view');
  const status = document.getElementById('status');
  const micBtn = document.getElementById('mic-btn');
  const manualInput = document.getElementById('manual');

  let recognition;
  let isSpeaking = false;
  let isRecording = false;

  function getSyllables(word) {
    const vowels = "аоуиіеяюєї";
    const syllables = [];
    let current = "";
    for (let i = 0; i < word.length; i++) {
      current += word[i];
      if (vowels.includes(word[i].toLowerCase())) {
        let hasNextVowel = false;
        for (let j = i + 1; j < word.length; j++) if (vowels.includes(word[j].toLowerCase())) hasNextVowel = true;
        if (hasNextVowel) { syllables.push(current); current = ""; }
      }
    }
    if (current) syllables.push(current);
    if (syllables.length > 1 && ![...syllables[syllables.length-1]].some(c => vowels.includes(c.toLowerCase()))) {
      const tail = syllables.pop();
      syllables[syllables.length-1] += tail;
    }
    return syllables;
  }

  async function speakWord(word) {
    if (!word || isSpeaking) return;
    isSpeaking = true;
    
    const cleanWord = word.trim().toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!cleanWord) { isSpeaking = false; return; }

    window.speechSynthesis.cancel();
    bigWord.innerText = cleanWord.toUpperCase();
    status.innerText = "🔊 Слухай...";

    const syllables = getSyllables(cleanWord);
    
    for (let i = 0; i < syllables.length; i++) {
      sylView.innerHTML = syllables.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(res => {
        const u = new SpeechSynthesisUtterance(syllables[i]);
        u.lang = 'uk-UA';
        u.rate = 0.6;
        u.onend = res;
        u.onerror = res;
        window.speechSynthesis.speak(u);
      });
    }
    
    isSpeaking = false;
    status.innerText = "Готово! Ще раз?";
  }

  function startRec(e) {
    if (e) e.preventDefault();
    if (isSpeaking || isRecording) return;
    
    isRecording = true;
    micBtn.classList.add('recording');
    status.innerText = "🎤 Говори...";
    
    try {
      recognition.start();
    } catch(err) {}
  }

  function stopRec(e) {
    if (e) e.preventDefault();
    if (!isRecording) return;
    
    isRecording = false;
    micBtn.classList.remove('recording');
    status.innerText = "Обробка...";
    
    setTimeout(() => {
      try { recognition.stop(); } catch(err) {}
    }, 200);
  }

  function fromInput() {
    if (manualInput.value) {
      speakWord(manualInput.value);
      manualInput.value = "";
    }
  }

  function startApp() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'uk-UA';
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const lastWord = text.trim().split(' ').pop();
        speakWord(lastWord);
      };

      recognition.onerror = (e) => {
        if (isRecording) {
          status.innerText = "Помилка мікрофона";
          stopRec();
        }
      };
    } else {
      status.innerText = "Голос не підтримується";
    }
  }
</script>
</body>
</html>
