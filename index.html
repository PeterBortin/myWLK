<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Ultra-Fix</title>
  <style>
    :root { --p: #FF9F43; --s: #48DBFB; --bg: #F7F9FC; --err: #FF4757; }
    body { 
      margin: 0; background: var(--bg); font-family: system-ui, -apple-system, sans-serif; 
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none;
    }
    #overlay { position: fixed; inset: 0; background: var(--p); z-index: 100; display: flex; justify-content: center; align-items: center; }
    #main { display: none; flex: 1; flex-direction: column; padding: 20px; justify-content: space-between; max-width: 500px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    
    .word-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: white; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 20px;
    }
    #big-word { font-size: 50px; font-weight: 900; color: #333; text-align: center; line-height: 1.2; }
    #syl-view { font-size: 30px; color: #999; margin-top: 10px; min-height: 40px; }
    .active-syl { color: var(--p); transform: scale(1.2); display: inline-block; font-weight: bold; }

    .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #mic-btn {
      width: 100px; height: 100px; border-radius: 50%; background: var(--s); border: 8px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent;
    }
    #mic-btn.active { background: var(--err); transform: scale(1.1); box-shadow: 0 0 20px var(--err); }
    
    .input-row { display: flex; gap: 10px; width: 100%; }
    input { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 18px; outline: none; }
    #status { font-size: 14px; color: #666; height: 20px; text-align: center; }
  </style>
</head>
<body>

<div id="overlay">
  <button style="padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none; background: white; font-weight: bold;" onclick="init()">ПОЧАТИ</button>
</div>

<div id="main">
  <div id="status">Натисніть "Дозволити мікрофон"</div>
  <div class="word-area">
    <div id="big-word">ПРИВІТ</div>
    <div id="syl-view"></div>
  </div>
  <div class="controls">
    <div id="mic-btn">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    <div class="input-row">
      <input type="text" id="manual" placeholder="Або напишіть...">
      <button onclick="handleInput()" style="padding: 0 20px; border-radius: 15px; border: none; background: #2ecc71; color: white; font-weight: bold;">ОК</button>
    </div>
  </div>
</div>

<script>
  let rec;
  let isSpeaking = false;
  const status = document.getElementById('status');

  function getSyllables(w) {
    const v = "аоуиіеяюєї";
    let res = [], cur = "";
    for (let i = 0; i < w.length; i++) {
      cur += w[i];
      if (v.includes(w[i].toLowerCase())) {
        let next = false;
        for (let j = i+1; j < w.length; j++) if (v.includes(w[j].toLowerCase())) next = true;
        if (next) { res.push(cur); cur = ""; }
      }
    }
    res.push(cur);
    if (res.length > 1 && ![...res[res.length-1]].some(c => v.includes(c.toLowerCase()))) {
      res[res.length-2] += res.pop();
    }
    return res.filter(s => s);
  }

  async function processWord(word) {
    if (!word || isSpeaking) return;
    const clean = word.toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!clean) return;

    isSpeaking = true;
    window.speechSynthesis.cancel();
    
    document.getElementById('big-word').innerText = clean.toUpperCase();
    const syls = getSyllables(clean);

    for (let i = 0; i < syls.length; i++) {
      document.getElementById('syl-view').innerHTML = syls.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(resolve => {
        const u = new SpeechSynthesisUtterance(syls[i]);
        u.lang = 'uk-UA'; u.rate = 0.6;
        u.onend = resolve; u.onerror = resolve;
        window.speechSynthesis.speak(u);
      });
    }
    isSpeaking = false;
    status.innerText = "Готово! Кажи ще.";
  }

  function handleInput() {
    const input = document.getElementById('manual');
    processWord(input.value);
    input.value = "";
    input.blur();
  }

  function init() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    
    // Розблокування аудіо
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      status.innerText = "Браузер не підтримує голос";
      return;
    }

    rec = new SpeechRecognition();
    rec.lang = 'uk-UA';
    rec.continuous = false; 

    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      processWord(text.trim().split(' ').pop());
    };

    rec.onend = () => document.getElementById('mic-btn').classList.remove('active');
    rec.onerror = (e) => {
      status.innerText = "Помилка: " + e.error;
      document.getElementById('mic-btn').classList.remove('active');
    };

    const mic = document.getElementById('mic-btn');
    
    // Обробка затискання
    const start = (e) => {
      e.preventDefault();
      if (isSpeaking) return;
      mic.classList.add('active');
      status.innerText = "🎤 Слухаю...";
      try { rec.start(); } catch(err) {}
    };

    const stop = (e) => {
      e.preventDefault();
      try { rec.stop(); } catch(err) {}
      status.innerText = "Розпізнаю...";
    };

    mic.addEventListener('mousedown', start);
    mic.addEventListener('mouseup', stop);
    mic.addEventListener('touchstart', start, {passive: false});
    mic.addEventListener('touchend', stop, {passive: false});
  }
</script>
</body>
</html>
