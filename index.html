<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вчимося Читати Разом!</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

  <style>
    :root {
      --bg-color: #f0f9ff;
      --accent-color: #ff6b6b;
      --secondary-color: #4ecdc4;
      --text-main: #2d3436;
    }

    body { 
      margin: 0; 
      background: var(--bg-color); 
      overflow: hidden; 
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
      color: var(--text-main); 
    }

    /* Экран приветствия */
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
    }

    #start-btn {
      background: var(--accent-color); border: none; color: #fff;
      padding: 20px 40px; cursor: pointer; border-radius: 50px;
      font-size: 24px; font-weight: bold; box-shadow: 0 10px 0 #d64545;
      transition: 0.2s;
    }
    #start-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #d64545; }

    /* Основной интерфейс */
    #container { 
      position: relative; width: 100vw; height: 100vh; 
      display: flex; flex-direction: column; align-items: center; visibility: hidden; 
    }

    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.8;
    }

    /* Панель слова */
    .word-display-area {
      position: relative; z-index: 10; margin-top: 50px;
      background: rgba(255, 255, 255, 0.9);
      padding: 30px; border-radius: 30px; border: 8px solid var(--secondary-color);
      min-width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    #word-output { font-size: 80px; letter-spacing: 5px; color: #2d3436; margin-bottom: 10px; }
    #syllables-output { font-size: 40px; color: var(--accent-color); font-weight: bold; }

    /* Нижняя панель */
    .bottom-ui {
      position: absolute; bottom: 40px; z-index: 10; width: 90%;
      background: white; border-radius: 20px; padding: 20px;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.05); text-align: center;
    }

    .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #eee; font-size: 14px; }
    .pulse { animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red { 0% { color: #888; } 50% { color: red; } 100% { color: #888; } }
    
    .input_video { display: none; }
  </style>
</head>

<body>

  <div id="preloader">
    <h1 style="font-size: 48px; color: var(--accent-color);">Привіт! Давай вчитися?</h1>
    <p style="margin-bottom: 30px;">Натисни кнопку, щоб розпочати</p>
    <button id="start-btn" onclick="startApp()">ГРАТИ</button>
  </div>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>

    <div class="word-display-area">
      <div id="word-output">ГОВОРИ!</div>
      <div id="syllables-output"></div>
    </div>

    <div class="bottom-ui">
      <div id="status" class="status-badge">СЛУХАЮ ТЕБЕ...</div>
      <p style="font-size: 14px; color: #999; margin-top: 10px;">Скажи слово українською мовою</p>
    </div>
  </div>

  <script>
    const wordOutput = document.getElementById('word-output');
    const syllablesOutput = document.getElementById('syllables-output');
    const statusLabel = document.getElementById('status');
    
    // Функція розбиття на склади (Спрощений алгоритм для української)
    function splitIntoSyllables(word) {
      const vowels = "аоуиіеяюєї";
      let syllables = [];
      let currentSyllable = "";
      
      const chars = word.toLowerCase().split('');
      
      for (let i = 0; i < chars.length; i++) {
        currentSyllable += chars[i];
        // Якщо поточна літера - голосна
        if (vowels.includes(chars[i])) {
          // Дивимось, чи є далі голосні
          let hasMoreVowels = false;
          for (let j = i + 1; j < chars.length; j++) {
            if (vowels.includes(chars[j])) { hasMoreVowels = true; break; }
          }
          
          if (hasMoreVowels) {
            // Перевірка наступної літери (якщо приголосна + голосна, склад розриваємо)
            syllables.push(currentSyllable);
            currentSyllable = "";
          }
        }
      }
      if (currentSyllable) {
        if (syllables.length > 0 && !vowels.split('').some(v => currentSyllable.includes(v))) {
          syllables[syllables.length - 1] += currentSyllable;
        } else {
          syllables.push(currentSyllable);
        }
      }
      return syllables;
    }

    // Озвучка по складах
    function speakSyllables(syllables) {
      const synth = window.speechSynthesis;
      let delay = 0;
      
      syllables.forEach((syl, index) => {
        setTimeout(() => {
          const utter = new SpeechSynthesisUtterance(syl);
          utter.lang = 'uk-UA';
          utter.rate = 0.8;
          synth.speak(utter);
          
          // Візуальна підсвітка складу
          const spans = syllablesOutput.querySelectorAll('span');
          spans.forEach(span => span.style.color = '#ff6b6b');
          if(spans[index]) spans[index].style.color = '#4ecdc4';
        }, delay);
        delay += 800; // Пауза між складами
      });
    }

    async function startApp() {
      document.getElementById('preloader').style.display = 'none';
      document.getElementById('container').style.visibility = 'visible';

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      document.querySelector('.input_video').srcObject = stream;

      initSpeechRecognition();
    }

    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Браузер не підтримує розпізнавання мови.");

      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = 'uk-UA';

      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
        const cleanWord = transcript.split(' ').pop(); // Беремо останнє слово
        
        wordOutput.innerText = cleanWord.toUpperCase();
        
        const syllables = splitIntoSyllables(cleanWord);
        syllablesOutput.innerHTML = syllables.map(s => `<span>${s}</span>`).join(' • ');
        
        speakSyllables(syllables);
      };

      recognition.onstart = () => {
        statusLabel.innerText = "Я СЛУХАЮ...";
        statusLabel.classList.add('pulse');
      };

      recognition.onend = () => { recognition.start(); };
      recognition.start();
    }
  </script>
</body>
</html>
