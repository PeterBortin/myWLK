<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Інтерактивний Буквар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1 class="instruction">Натисни та промов слово:</h1>
        
        <div class="word-display" id="wordBox">
            <span class="syllable" id="s1">мо</span>
            <span class="syllable" id="s2">ло</span>
            <span class="syllable" id="s3">ко</span>
        </div>

        <div class="controls">
            <button id="micBtn" class="mic-button">
                <span class="icon">🎤</span>
            </button>
        </div>
        
        <p id="statusText">Готовий до роботи</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
