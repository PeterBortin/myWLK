<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Ultra-Light</title>
  
  <style>
    :root {
      --primary: #FF9F43;
      --secondary: #48DBFB;
      --success: #2ECC71;
      --bg: #F7F9FC;
    }

    body { 
      margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; 
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; touch-action: manipulation;
    }

    #overlay {
      position: fixed; inset: 0; background: var(--primary); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center;
    }

    #main { 
      display: none; flex: 1; flex-direction: column; padding: 20px; 
      justify-content: space-between; max-width: 600px; margin: 0 auto; width: 100%;
      box-sizing: border-box;
    }

    .word-area {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: white; border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 20px; border: 4px solid #eee;
    }

    #big-word { 
      font-size: clamp(40px, 15vw, 80px); 
      font-weight: 900; color: #2D3436; 
      text-align: center; margin-bottom: 20px;
      letter-spacing: 2px;
    }

    #syl-view { 
      font-size: clamp(24px, 8vw, 40px); 
      color: #A0A0A0; font-weight: 600;
    }

    .active-syl { 
      color: var(--primary); 
      transform: scale(1.3); 
      display: inline-block;
      transition: all 0.2s ease;
      text-decoration: underline;
    }

    .ui-group { display: flex; gap: 10px; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    
    input { 
      flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #E0E0E0;
      font-size: 18px; outline: none; transition: border 0.3s;
    }
    input:focus { border-color: var(--secondary); }

    .btn { 
      padding: 15px 25px; border-radius: 15px; border: none; 
      background: var(--secondary); color: #fff; font-weight: bold;
      cursor: pointer; active: transform 0.1s;
    }
    .btn:active { transform: scale(0.95); }

    #status { 
      text-align: center; font-size: 16px; font-weight: bold;
      padding: 15px; height: 20px; transition: all 0.3s;
    }
    .rec-active { color: #FF4757; animation: pulse 1.5s infinite; }
    .speaking { color: var(--success); }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1 style="font-size: 40px; margin-bottom: 20px;">Привіт! 👋</h1>
  <p style="margin-bottom: 30px; font-size: 18px;">Натисни кнопку і кажи слово</p>
  <button class="btn" style="padding: 20px 60px; font-size: 24px; background: white; color: var(--primary); border-radius: 50px;" onclick="startApp()">ПОЧАТИ</button>
</div>

<div id="main">
  <div id="status">Завантаження...</div>

  <div class="word-area">
    <div id="big-word">ПРИВІТ</div>
    <div id="syl-view"></div>
  </div>

  <div class="ui-group">
    <input type="text" id="manual" placeholder="Напиши слово...">
    <button class="btn" onclick="fromInput()">ОК</button>
  </div>
</div>

<script>
  const bigWord = document.getElementById('big-word');
  const sylView = document.getElementById('syl-view');
  const status = document.getElementById('status');
  const manualInput = document.getElementById('manual');
  
  let recognition;
  let isSpeaking = false;

  // Покращений алгоритм складів для української мови
  function getSyllables(word) {
    const vowels = "аоуиіеяюєї";
    const syllables = [];
    let currentSyllable = "";

    for (let i = 0; i < word.length; i++) {
      currentSyllable += word[i];
      if (vowels.includes(word[i].toLowerCase())) {
        // Перевірка, чи є далі голосні
        let hasMoreVowels = false;
        for (let j = i + 1; j < word.length; j++) {
          if (vowels.includes(word[j].toLowerCase())) {
            hasMoreVowels = true;
            break;
          }
        }
        if (hasMoreVowels) {
          syllables.push(currentSyllable);
          currentSyllable = "";
        }
      }
    }
    currentSyllable ? syllables.push(currentSyllable) : null;
    
    // Якщо останній склад без голосної — приєднуємо до попереднього
    if (syllables.length > 1) {
        const last = syllables[syllables.length - 1];
        const hasVowel = [...last].some(char => vowels.includes(char.toLowerCase()));
        if (!hasVowel) {
            const tail = syllables.pop();
            syllables[syllables.length - 1] += tail;
        }
    }
    return syllables;
  }

  async function speakWord(word) {
    if (!word || isSpeaking) return;
    
    isSpeaking = true;
    if (recognition) try { recognition.stop(); } catch(e) {}
    
    status.innerText = "🔊 Читаю...";
    status.className = "speaking";

    const cleanWord = word.trim().toLowerCase().replace(/[^а-яіїєґ]/gi, '');
    if (!cleanWord) { isSpeaking = false; return; }

    const syllables = getSyllables(cleanWord);
    bigWord.innerText = cleanWord.toUpperCase();

    for (let i = 0; i < syllables.length; i++) {
      sylView.innerHTML = syllables.map((s, idx) => 
        `<span class="${idx === i ? 'active-syl' : ''}">${s}</span>`
      ).join(' · ');

      await new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(syllables[i]);
        utterance.lang = 'uk-UA';
        utterance.rate = 0.6; // Повільніше для дитини
        utterance.pitch = 1.1; 
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.speak(utterance);
      });
    }

    isSpeaking = false;
    status.innerText = "🎤 Слухаю...";
    status.className = "rec-active";
    if (recognition) try { recognition.start(); } catch(e) {}
  }

  function fromInput() {
    const val = manualInput.value;
    if (val) {
      speakWord(val);
      manualInput.value = "";
      manualInput.blur();
    }
  }

  // Обробка Enter в інпуті
  manualInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') fromInput();
  });

  function startApp() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'uk-UA';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        if (!isSpeaking) {
          status.innerText = "🎤 Слухаю...";
          status.className = "rec-active";
        }
      };

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const words = text.split(' ');
        const lastWord = words[words.length - 1];
        speakWord(lastWord);
      };

      recognition.onend = () => {
        if (!isSpeaking) recognition.start();
      };

      recognition.onerror = (e) => {
        console.log("SR Error:", e.error);
        if (e.error !== 'not-allowed' && !isSpeaking) {
            setTimeout(() => { try { recognition.start(); } catch(err) {} }, 1000);
        }
      };

      recognition.start();
    } else {
      status.innerText = "Голосовий ввід не підтримується";
    }
  }
</script>
</body>
</html>
