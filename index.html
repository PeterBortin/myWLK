<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Читайлик Light</title>
  
  <style>
    :root {
      --primary: #FF9F43;
      --secondary: #48DBFB;
      --bg: #FFFFFF;
      --card: #F8F9FA;
    }

    body { 
      margin: 0; background: var(--bg); 
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden; touch-action: manipulation;
    }

    /* Стартовый экран */
    #preloader {
      position: fixed; inset: 0; background: var(--primary);
      z-index: 100; display: flex; flex-direction: column;
      justify-content: center; align-items: center; color: white;
    }

    .btn-big {
      padding: 18px 45px; font-size: 24px; border: none;
      border-radius: 50px; background: white; color: var(--primary);
      font-weight: bold; box-shadow: 0 6px 0 #E67E22;
    }

    /* Основной экран */
    #app { 
      display: none; height: 100vh; flex-direction: column; 
      padding: 20px; box-sizing: border-box; 
    }

    .display-box {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: var(--card); border-radius: 25px;
      border: 4px dashed var(--secondary); margin-bottom: 20px;
    }

    #word-main { 
      font-size: clamp(40px, 12vw, 80px); 
      font-weight: 800; margin-bottom: 10px; text-align: center;
    }

    #syllables-box { 
      font-size: clamp(20px, 6vw, 36px); 
      color: var(--primary); min-height: 40px; 
    }

    .syllable { display: inline-block; transition: all 0.2s ease; margin: 0 2px; }
    .active { color: #1DD1A1; transform: scale(1.2); font-weight: bold; }

    /* Управление */
    .controls { display: flex; gap: 10px; width: 100%; }
    input { 
      flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #ddd;
      font-size: 16px; -webkit-appearance: none;
    }
    .go-btn { 
      background: var(--secondary); color: white; border: none;
      padding: 0 20px; border-radius: 12px; font-weight: bold;
    }

    #status { 
      text-align: center; font-size: 12px; margin-top: 10px; 
      color: #999; text-transform: uppercase; letter-spacing: 1px;
    }
    .pulse { color: red; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
  </style>
</head>
<body>

  <div id="preloader">
    <h1 style="margin-bottom:20px">🤖 ЧИТАЙЛИК</h1>
    <button class="btn-big" onclick="init()">ПОЧАТИ</button>
  </div>

  <div id="app">
    <div class="display-box">
      <div id="word-main">...</div>
      <div id="syllables-box"></div>
    </div>
    
    <div class="controls">
      <input type="text" id="inp" placeholder="Напиши слово...">
      <button class="go-btn" onclick="manual()">ОК</button>
    </div>
    <div id="status">Очікування...</div>
  </div>

  <script>
    const wordEl = document.getElementById('word-main');
    const sylEl = document.getElementById('syllables-box');
    const statusEl = document.getElementById('status');
    const inputEl = document.getElementById('inp');
    
    let isSpeaking = false;
    let lastWord = "";

    function splitSyllables(word) {
      const vowels = "аоуиіеяюєї";
      let res = [];
      let cur = "";
      for (let i = 0; i < word.length; i++) {
        cur += word[i];
        if (vowels.includes(word[i].toLowerCase())) {
          let hasNextVowel = false;
          for (let j = i + 1; j < word.length; j++) {
            if (vowels.includes(word[j].toLowerCase())) { hasNextVowel = true; break; }
          }
          if (hasNextVowel) { res.push(cur); cur = ""; }
        }
      }
      res.push(cur);
      if (res.length > 1 && !/[аоуиіеяюєї]/i.test(res[res.length-1])) {
        res[res.length-2] += res.pop();
      }
      return res.filter(s => s);
    }

    async function say(word) {
      if (isSpeaking || !word || word === lastWord) return;
      isSpeaking = true;
      lastWord = word;
      
      const syllables = splitSyllables(word);
      wordEl.innerText = word.toUpperCase();
      
      for (let i = 0; i < syllables.length; i++) {
        // Отрисовка слогов
        sylEl.innerHTML = syllables.map((s, idx) => 
          `<span class="syllable ${idx === i ? 'active' : ''}">${s}</span>`
        ).join(' · ');

        await new Promise(resolve => {
          const u = new SpeechSynthesisUtterance(syllables[i]);
          u.lang = 'uk-UA';
          u.rate = 0.7;
          u.onend = resolve;
          u.onerror = resolve;
          window.speechSynthesis.speak(u);
        });
      }
      
      sylEl.innerHTML = syllables.map(s => `<span class="syllable">${s}</span>`).join(' · ');
      isSpeaking = false;
      setTimeout(() => { lastWord = ""; }, 2000); // Сброс памяти слова через 2 сек
    }

    function manual() {
      if (inputEl.value) {
        say(inputEl.value.trim().toLowerCase());
        inputEl.value = "";
        inputEl.blur(); // Спрятать клавиатуру на мобилках
      }
    }

    function init() {
      document.getElementById('preloader').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      
      // Голосовой ввод
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (Recognition) {
        const rec = new Recognition();
        rec.lang = 'uk-UA';
        rec.continuous = true;
        rec.onstart = () => { statusEl.innerText = "🎤 Слухаю..."; statusEl.classList.add('pulse'); };
        rec.onresult = (e) => {
          const text = e.results[e.results.length-1][0].transcript;
          const word = text.split(' ').pop().toLowerCase().replace(/[^а-яіїєґ]/g, '');
          if (word.length > 1) say(word);
        };
        rec.onend = () => rec.start();
        rec.start();
      } else {
        statusEl.innerText = "Голосовий ввід не підтримується";
      }
    }
  </script>
</body>
</html>
